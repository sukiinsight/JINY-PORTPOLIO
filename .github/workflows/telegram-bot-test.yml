name: Run Telegram bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose whether to send a quick test message or run the bot."
        required: true
        default: send-test
        type: choice
        options:
          - send-test
          - run-bot

concurrency:
  group: telegram-bot-manual
  cancel-in-progress: true

jobs:
  telegram-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Send one-time Telegram test message
        if: ${{ github.event.inputs.mode == 'send-test' }}
        run: npm run test:once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run Telegram bot with polling
        if: ${{ github.event.inputs.mode == 'run-bot' }}
        run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ALLOWED_TELEGRAM_USER_IDS: ${{ secrets.ALLOWED_TELEGRAM_USER_IDS }}
